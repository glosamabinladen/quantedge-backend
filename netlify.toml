[build]
  publish = "public"
  functions = "netlify/functions"
  command = "echo done"

[build.environment]
  NODE_VERSION = "18"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  NEXT_PRIVATE_SKIP_PLUGIN = "true"

[build.processing]
  skip_processing = true

[[plugins]]
  package = "@netlify/plugin-nextjs"
  [plugins.inputs]
    enabled = false

[[scheduledFunctions]]
  function = "morning-briefing"
  cron = "0 14 * * 1-5"

[[scheduledFunctions]]
  function = "eod-debrief"
  cron = "0 21 * * 1-5"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://glosamabinladen.github.io"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
