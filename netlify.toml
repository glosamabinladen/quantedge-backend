[build]
  functions = "netlify/functions"

# Morning briefing — 9:00 AM EST (14:00 UTC) weekdays
[functions."morning-briefing"]
  schedule = "0 14 * * 1-5"

# EOD debrief — 4:05 PM EST (21:05 UTC) weekdays
[functions."eod-debrief"]
  schedule = "5 21 * * 1-5"

# Market scanner — every 30 min during market hours 9:30AM-4PM EST
[functions."market-scanner"]
  schedule = "0,30 14-20 * * 1-5"
