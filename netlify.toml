[build]
  publish = "public"
  functions = "netlify/functions"
  command = "echo done"

[build.environment]
  NODE_VERSION = "18"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  NEXT_PRIVATE_SKIP_PLUGIN = "true"

[build.processing]
  skip_processing = true

[functions."morning-briefing"]
  schedule = "0 14 * * 1-5"

[functions."eod-debrief"]
  schedule = "0 21 * * 1-5"

[functions."market-scanner"]
  schedule = "30 13,14,15,16,17,18,19 * * 1-5"

[[redirects]]
  from   = "/api/:function"
  to     = "/.netlify/functions/:function"
  status = 200
  force  = true

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
